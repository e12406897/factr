name: sim # options: sim/left/right (decides the zmq addresses used for follower/leader communication)

dynamixel:
  # USB port names given by the command: ls /dev/serial/by-id/
  # One entry per physically separate serial adapter.
  ports:
    - "usb-FTDI_USB__-__Serial_Converter_FT9HD80O-if00-port0"   # Port 0
    - "usb-FTDI_USB__-__Serial_Converter_FT9HDA6P-if00-port0"   # Port 1
  # Servo types
  servo_types: [
    "XL330_M288_T", "XM430_W350_T", "XL330_M288_T", "XM430_W350_T",
    "XL330_M288_T", "XL330_M288_T", "XL330_M288_T", "XL330_M288_T"
  ]
  # Servo joint directions to match that of the leader arm
  joint_signs: [1, -1, 1, -1, 1, -1, 1, -1]
  # Which port (index into `ports` above) Dynamixel ID i+1 is wired to, in the same
  # order as servo_types/joint_signs (arm joints 1-7, then gripper). Dynamixel IDs are
  # assumed to already be assigned 1..8 in this joint order across both ports.
  servo_port_index: [0, 1, 0, 1, 0, 0, 0, 0]
  
arm_teleop:
  # URDF used for creating leader arm dynamics model to compute gravity compensation
  leader_urdf: "factr_teleop_franka.urdf"
  num_arm_joints: 7
  arm_joint_limits_max: [2.8973, 1.7628, 2.8973, -0.8698, 2.8973, 3.7525, 2.8973]
  arm_joint_limits_min: [-2.8973, -1.7628, -2.8973, -3.0718, -2.8973, -0.0175, -2.8973]
  arm_joint_limits_safety_margin: 0.1
  initialization:
    # The expected leader arm joint position before launching the script
    calibration_joint_pos: [0, 0, 0, -1.57, 0, 1.57, 0]
    # The leader arm must be brought to this joint position before the follower starts mirroring the leader
    initial_match_joint_pos: [0, 0, 0, -1.57, 0, 1.57, 0]
  
gripper_teleop:
  # The maximum range (in rad) of the leader gripper trigger
  actuation_range: 0.8

controller:
  frequency: 500
  torque_feedback:
    enable: True
    gain: 0.2
    damping: 0
    motor_scalar: 94.5652173913
  gravity_comp:
    enable: False
    gain: 0.85
  null_space_regulation:
    null_space_joint_target: [0.0, -0.7854, 0.0, -2.356, 0.0, 1.57, 0.0, 0.0]
    kp: 0 #0.1
    kd: 0 #0.01
  static_friction_comp:
    enable_speed: 0.9
    gain: 0 #0.6
  joint_limit_barrier:
    kp: 1.03561658022
    kd: 0.04315069084
  joint_position_control:
    interpolation_step_size: 0.5
    kp: 1.03561658022
    kd: 0.04315069084

  gripper_feedback:
    enable: False
    gain: 0.28328611898
    ema_beta: 0.95